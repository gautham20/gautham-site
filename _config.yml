# Analytics
umami:
  url:        "" # e.g. https://your-umami.vercel.app
  website_id: "" # from Umami dashboard → Settings → Websites

# Site Settings
locale                   : "en-US"
title                    : "Gautham Kumaran"
title_separator          : "-"
subtitle                 : "Applied AI Engineer · Senior Data Scientist"
name                     : "Gautham Kumaran"
description              : "Applied AI Engineer and Senior Data Scientist with 10+ years of experience building ML systems with measurable business impact."
url                      : ""
baseurl                  : ""
repository               : "gautham20/gautham-site"

# Social Sharing
social:
  type                   : Person
  name                   : Gautham Kumaran
  links:
    - "https://linkedin.com/in/gautham20"
    - "https://github.com/gautham20"


# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - vendor
  - .bundle
  - .sass-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS
sass:
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: Asia/Dubai


# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed

whitelist:
  - jekyll-sitemap
  - jekyll-feed


# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page
